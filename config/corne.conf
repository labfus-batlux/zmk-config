# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# --- nice!view display via zmk-nice-oled ---
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Peripheral animation (options: CAT, GEM, HEAD, SPACEMAN, POKEMON)
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_GEM=y

# Peripheral static fallback (shows when animation is disabled)
CONFIG_NICE_OLED_WIDGET_STATIC_IMAGE_PERIPHERAL_VIM=y

# Central mascot (pick ONE — they conflict if both enabled)
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n

# Invert display colors (disabled — using default colors)
# CONFIG_NICE_OLED_WIDGET_INVERTED=y

# --- Bluetooth robustness / link quality ---
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=9
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=18
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# --- Mouse key support ---
CONFIG_ZMK_POINTING=y

# --- General stability / power behavior ---
CONFIG_ZMK_SLEEP=y
